<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subcard — Under Maintenance</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #080818;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            overflow: hidden;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 70% 50% at 20% 30%, rgba(99,102,241,0.18) 0%, transparent 65%),
                radial-gradient(ellipse 60% 40% at 80% 70%, rgba(167,139,250,0.12) 0%, transparent 65%),
                radial-gradient(ellipse 40% 50% at 60% 10%, rgba(55,48,163,0.15) 0%, transparent 60%);
            pointer-events: none;
            animation: bgPulse 8s ease-in-out infinite alternate;
        }

        @keyframes bgPulse {
            0%  { opacity: 0.8; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.04); }
        }

        /* Grid lines */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(99,102,241,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99,102,241,0.05) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
        }

        .page-content {
            position: relative;
            z-index: 10;
            max-width: 540px;
            width: 100%;
        }

        /* Logo */
        .logo {
            font-family: 'Syne', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #818cf8, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 48px;
            letter-spacing: -0.5px;
        }

        /* Gear animation container */
        .gear-container {
            position: relative;
            width: 180px;
            height: 180px;
            margin: 0 auto 40px;
        }

        /* Outer glow ring */
        .glow-ring {
            position: absolute;
            inset: -10px;
            border-radius: 50%;
            border: 1px solid rgba(99,102,241,0.25);
            animation: ringPulse 2.5s ease-in-out infinite;
        }
        .glow-ring-2 {
            position: absolute;
            inset: -25px;
            border-radius: 50%;
            border: 1px solid rgba(99,102,241,0.12);
            animation: ringPulse 2.5s ease-in-out infinite 0.4s;
        }

        @keyframes ringPulse {
            0%, 100% { transform: scale(0.95); opacity: 0.4; }
            50% { transform: scale(1.05); opacity: 0.1; }
        }

        /* Main gear */
        .gear-main {
            position: absolute;
            top: 15px;
            left: 15px;
            width: 100px;
            height: 100px;
            animation: spinGear 7s linear infinite;
            filter: drop-shadow(0 0 14px rgba(99,102,241,0.6));
        }

        /* Small gear */
        .gear-small {
            position: absolute;
            bottom: 8px;
            right: 8px;
            width: 60px;
            height: 60px;
            animation: spinGearReverse 5s linear infinite;
            filter: drop-shadow(0 0 8px rgba(167,139,250,0.6));
        }

        /* Orbiting dot */
        .orbit {
            position: absolute;
            inset: 0;
            animation: spinGear 3.5s linear infinite;
        }
        .orbit-dot {
            position: absolute;
            top: 2px;
            left: 50%;
            transform: translateX(-50%);
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: #6366f1;
            box-shadow: 0 0 12px #6366f1;
        }

        @keyframes spinGear {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }
        @keyframes spinGearReverse {
            from { transform: rotate(360deg); }
            to   { transform: rotate(0deg); }
        }

        /* Heading */
        h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(2rem, 5vw, 2.8rem);
            font-weight: 800;
            line-height: 1.15;
            letter-spacing: -1px;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #e0e7ff, #a78bfa, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: fadeSlideUp 0.9s ease both;
        }

        .subtitle {
            font-size: 1rem;
            color: #94a3b8;
            line-height: 1.7;
            margin-bottom: 10px;
            animation: fadeSlideUp 1.1s ease both;
        }

        .sub-note {
            font-size: 0.82rem;
            color: #475569;
            animation: fadeSlideUp 1.3s ease both;
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Progress bar */
        .progress-wrap {
            width: 100%;
            max-width: 300px;
            height: 5px;
            background: rgba(255,255,255,0.07);
            border-radius: 99px;
            margin: 36px auto 28px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            border-radius: 99px;
            background: linear-gradient(90deg, #6366f1, #a78bfa, #6366f1);
            background-size: 200% 100%;
            animation: progressSlide 2.5s ease-in-out infinite alternate, shimmer 2s linear infinite;
        }
        @keyframes progressSlide {
            0%  { width: 15%; margin-left: 0; }
            100% { width: 55%; margin-left: 35%; }
        }
        @keyframes shimmer {
            from { background-position: 200% center; }
            to   { background-position: -200% center; }
        }

        /* Footer */
        .footer-brand {
            font-size: 12px;
            color: #334155;
            margin-top: 8px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        /* Floating particles */
        .particle {
            position: fixed;
            border-radius: 50%;
            background: rgba(99,102,241,0.5);
            pointer-events: none;
            animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0%   { transform: translateY(0) scale(1); opacity: 0.6; }
            100% { transform: translateY(-100vh) scale(0.3); opacity: 0; }
        }
    </style>
</head>
<body>
    <!-- Floating particles (JS generated) -->

    <div class="page-content">
        <div class="logo">subcard</div>

        <div class="gear-container">
            <div class="glow-ring-2"></div>
            <div class="glow-ring"></div>

            <!-- Orbiting dot -->
            <div class="orbit"><div class="orbit-dot"></div></div>

            <!-- Big gear -->
            <svg class="gear-main" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="1.3">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>

            <!-- Small gear -->
            <svg class="gear-small" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="1.3">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
        </div>

        <h1>Under Maintenance</h1>
        <p class="subtitle">We're upgrading our systems to serve you better.<br>We'll be back shortly.</p>
        <p class="sub-note">Thank you for your patience. &mdash; The Subcard Team</p>

        <div class="progress-wrap">
            <div class="progress-bar"></div>
        </div>

        <div class="footer-brand">&mdash; Subcard Services &mdash;</div>
    </div>

    <script>
        // Generate floating particles
        for (let i = 0; i < 18; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = Math.random() * 5 + 2;
            p.style.cssText = `
                width:${size}px; height:${size}px;
                left:${Math.random() * 100}vw;
                bottom:-${size}px;
                animation-duration:${Math.random() * 12 + 8}s;
                animation-delay:${Math.random() * 8}s;
                opacity:${Math.random() * 0.5 + 0.1};
            `;
            document.body.appendChild(p);
        }
    </script>
</body>
</html>
