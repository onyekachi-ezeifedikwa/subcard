{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subcard — Reset Link Sent</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Pacifico&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: rgb(52, 52, 255);
            --gradient: linear-gradient(135deg, #4f46e5, );
            --bg: #f7f7ff;
            --card-bg: #ffffff;
            --text: rgb(83, 82, 82);
            --text-muted: rgb(160, 160, 180);
            --border: rgb(225, 225, 245);
            --radius: 24px;
            --sh: 0 20px 40px rgba(52, 52, 255, 0.1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f172a;
                --card-bg: #1e293b;
                --text: #cbd5e1;
                --text-muted: #94a3b8;
                --border: rgba(255, 255, 255, 0.08);
                --sh: 0 20px 40px rgba(0, 0, 0, 0.3);
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 440px;
            background: var(--card-bg);
            padding: 48px 40px;
            border-radius: var(--radius);
            box-shadow: var(--sh);
            border: 1px solid var(--border);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: var(--gradient);
        }

        .logo {
            font-family: 'Pacifico', cursive;
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 24px;
            display: inline-block;
        }

        .icon-box {
            width: 80px;
            height: 80px;
            background: rgba(22, 163, 74, 0.1);
            color: rgb(22, 163, 74);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--text);
        }

        p {
            color: var(--text-muted);
            margin-bottom: 32px;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            background: var(--gradient);
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.2);
            text-decoration: none;
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .footer-link {
            margin-top: 32px;
            font-size: 0.9rem;
        }

        .footer-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="card">
        <a href="/" class="logo">subcard</a>
        <div class="icon-box">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <polyline points="22 12 12 12 2 12"></polyline>
                <path
                    d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 14.76 4H9.24a2 2 0 0 0-1.79 1.11z">
                </path>
            </svg>
        </div>
        <h1>Reset Link Sent</h1>
        <p>We've sent an email to your inbox with a link to reset your password. Please check your spam folder if you
            don't see it.</p>

        <a href="{% url 'login' %}" class="btn">Return to Login</a>

        <div class="footer-link">
            Didn't receive the email? <a href="{% url 'password_reset' %}">Try again</a>
        </div>
    </div>
</body>

</html>
