{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subcard — Reset Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: rgb(52, 52, 255);
            --gradient: linear-gradient(135deg, #4f46e5, #7c3aed, #a78bfa);
            --bg: #f7f7ff;
            --card-bg: #ffffff;
            --text: rgb(83, 82, 82);
            --text-muted: rgb(160, 160, 180);
            --border: rgb(225, 225, 245);
            --radius: 24px;
            --sh: 0 20px 40px rgba(52, 52, 255, 0.1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f172a;
                --card-bg: #1e293b;
                --text: #cbd5e1;
                --text-muted: #94a3b8;
                --border: rgba(255, 255, 255, 0.08);
                --sh: 0 20px 40px rgba(0, 0, 0, 0.3);
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 440px;
            background: var(--card-bg);
            padding: 48px 40px;
            border-radius: var(--radius);
            box-shadow: var(--sh);
            border: 1px solid var(--border);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 6px;
            background: var(--gradient);
        }

        .logo {
            font-family: 'Pacifico', cursive;
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 24px;
            display: inline-block;
        }

        h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 12px; color: var(--text); }
        p { color: var(--text-muted); margin-bottom: 32px; font-size: 0.95rem; line-height: 1.6; }

        .form-group { text-align: left; margin-bottom: 24px; }
        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); }
        
        input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 14px;
            border: 1.5px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 1rem;
            transition: all 0.2s;
            font-family: inherit;
        }
        
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(52, 52, 255, 0.1); }

        .btn {
            width: 100%;
            padding: 16px;
            background: var(--gradient);
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.2);
        }
        
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }

        .footer-link { margin-top: 32px; font-size: 0.9rem; }
        .footer-link a { color: var(--primary); text-decoration: none; font-weight: 600; }
        .footer-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <a href="/" class="logo">subcard</a>
        <h1>Forgot Password?</h1>
        <p>Enter your email address and we'll send you a secure link to reset your password.</p>
        
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_email">Email Address</label>
                <input type="email" name="email" id="id_email" placeholder="name@example.com" required autocomplete="email">
            </div>
            <button type="submit" class="btn">Send Reset Link →</button>
        </form>
        
        <div class="footer-link">
            <a href="{% url 'login' %}">← Back to Login</a>
        </div>
    </div>
</body>
</html>
